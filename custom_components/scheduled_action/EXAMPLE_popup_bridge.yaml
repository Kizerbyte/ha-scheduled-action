# Example popup bridge for the Scheduled Action integration
#
# Canonical public pattern:
# - use Browser Mod fire-dom-event as the caller/bridge
# - call integration service `scheduled_action.open_popup`
# - pass only `entry_id`
# - pass `browser_id: THIS`
# - keep scheduler details backend-owned
#
# Notes:
# - Browser Mod is required for the popup transport
# - `THIS` resolves correctly in the Browser Mod fire-dom-event path
# - plain `perform-action` does not resolve `THIS` correctly for this use case
# - the current implementation may still use the integration-owned
#   action select entity internally
# - that select helper is not part of the public Lovelace contract

# Canonical tile example:
#
# type: tile
# name: Airco scheduler
# icon: mdi:calendar-clock
# tap_action:
#   action: fire-dom-event
#   browser_mod:
#     service: scheduled_action.open_popup
#     data:
#       entry_id: YOUR_ENTRY_ID
#       browser_id: THIS

# Canonical Mushroom example:
#
# type: custom:mushroom-template-card
# primary: Airco scheduler
# icon: mdi:calendar-clock
# tap_action:
#   action: fire-dom-event
#   browser_mod:
#     service: scheduled_action.open_popup
#     data:
#       entry_id: YOUR_ENTRY_ID
#       browser_id: THIS

# Canonical button-card example:
#
# type: custom:button-card
# name: Airco scheduler
# icon: mdi:calendar-clock
# tap_action:
#   action: fire-dom-event
#   browser_mod:
#     service: scheduled_action.open_popup
#     data:
#       entry_id: YOUR_ENTRY_ID
#       browser_id: THIS

# ---------------------------------------------------------------------------
# Internal example retained for reference during current implementation phase
# ---------------------------------------------------------------------------
#
# This shows the helper scheduling script used by the popup buttons.
# It is not the recommended public launch setup.

script:
  scheduled_action_schedule_from_select:
    alias: Scheduled Action - Schedule from select
    mode: parallel
    fields:
      browser_id:
        required: false
        selector:
          text:
      entry_id:
        required: true
        selector:
          text:
      action_select_entity:
        required: true
        selector:
          entity:
            domain: select
      trigger_type:
        required: true
        selector:
          text:
      trigger_hours:
        required: false
        selector:
          number:
            min: 0
            max: 999
            step: 0.25
      trigger_event_name:
        required: false
        selector:
          text:
      trigger_label:
        required: false
        selector:
          text:
    sequence:
      - action: scheduled_action.get_popup_context
        data:
          entry_id: "{{ entry_id }}"
        response_variable: popup

      - variables:
          selected_label: "{{ states(action_select_entity) }}"
          action_id: >
            {% for item in popup.actions | default([]) %}
              {% if item.label == selected_label %}
                {{ item.id }}
                {% break %}
              {% endif %}
            {% endfor %}
          full_label: "{{ (selected_label ~ ' ' ~ (trigger_label | default(''))) | trim }}"
          trigger_payload: >
            {% if trigger_type == 'delay' %}
              {{ {'type': 'delay', 'hours': (trigger_hours | float)} }}
            {% elif trigger_type == 'event' %}
              {{ {'type': 'event', 'event_name': trigger_event_name} }}
            {% elif trigger_type == 'home' %}
              {{ {'type': 'home'} }}
            {% elif trigger_type == 'away' %}
              {{ {'type': 'away'} }}
            {% elif trigger_type == 'asleep' %}
              {{ {'type': 'asleep'} }}
            {% elif trigger_type == 'awake' %}
              {{ {'type': 'awake'} }}
            {% else %}
              {{ {'type': 'delay', 'hours': 0.5} }}
            {% endif %}

      - condition: template
        value_template: "{{ action_id | trim != '' }}"

      - action: scheduled_action.schedule
        data:
          entry_id: "{{ entry_id }}"
          action_id: "{{ action_id | trim }}"
          label: "{{ full_label if full_label else none }}"
          trigger: "{{ trigger_payload }}"

      - if:
          - condition: template
            value_template: "{{ browser_id is defined and browser_id not in [none, ''] }}"
        then:
          - action: browser_mod.close_popup
            data:
              browser_id: "{{ browser_id }}"
